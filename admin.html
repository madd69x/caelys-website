<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CAELYS Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }
    .stats-grid {
      display: grid;
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 2rem;
      margin-bottom: 4rem;
    }
    .stat-card {
      border: 2px solid var(--border-color);
      padding: 2rem;
      background: rgba(28, 34, 60, 0.8);
      text-align: center;
    }
    .stat-num {
      font-size: 4rem;
      color: var(--accent-color);
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Space Mono', monospace;
    }
    .data-table th, .data-table td {
      border: 1px solid var(--border-color);
      padding: 1rem;
      text-align: left;
    }
    .data-table th {
      background: var(--ivory);
      color: var(--deep-space);
      text-transform: uppercase;
      font-weight: 700;
    }
    .data-table tr:hover {
      background: rgba(144, 170, 214, 0.1);
    }
    .badge {
      padding: 0.2rem 0.5rem;
      background: var(--accent-color);
      color: var(--deep-space);
      font-weight: bold;
      font-size: 0.8rem;
    }
    @media (max-width: 768px) {
        .data-table { display: block; overflow-x: auto; }
        .admin-container { padding: 2rem 1rem; }
    }
  </style>
</head>
<body>
    <!-- Brutalist Noise Overlay -->
    <div class="noise-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9998; opacity: 0.04; background-image: url('data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E');"></div>
  <div class="admin-container">
    <h1 class="display-large brutal-text" style="color: var(--accent-color); margin-bottom: 2rem;">CAELYS DATABANK</h1>
    <h3 class="mono-text" style="margin-bottom: 4rem;">Secure Ticketing & Registration System</h3>
    
    <div class="stats-grid" id="stats">
      <!-- Stats injected here -->
    </div>

    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Institution</th>
          <th>Vertical</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Rows injected here -->
      </tbody>
    </table>
  </div>
  
  <script type="module">
    import { getRegistrations, getTeamApplications } from "/firebase-db.js";
    async function loadTickets() {
      const token = localStorage.getItem('caelys_admin_token');
      if (!token) {
        window.location.href = '/login.html';
        return;
      }
      
      try {
        const tickets = await getRegistrations();
        const teamApps = await getTeamApplications();
        // Combine them for the admin view
        tickets.push(...teamApps);
        
        const tbody = document.getElementById('table-body');
        const stats = document.getElementById('stats');
        
        // Render Stats
        const total = tickets.length;
        const counts = {};
        tickets.forEach(t => {
          counts[t.vertical] = (counts[t.vertical] || 0) + 1;
        });
        
        let statsHtml = `
          <div class="stat-card">
            <div class="stat-num brutal-text">${total}</div>
            <div class="mono-text text-dim">Total Tickets</div>
          </div>
        `;
        
        for (const [v, count] of Object.entries(counts)) {
          statsHtml += `
            <div class="stat-card">
              <div class="stat-num brutal-text" style="color: var(--ivory); font-size: 3rem;">${count}</div>
              <div class="mono-text text-dim">${v}</div>
            </div>
          `;
        }
        stats.innerHTML = statsHtml;
        
        // Render Table
        tbody.innerHTML = tickets.reverse().map(t => `
          <tr>
            <td style="color: var(--accent-color); font-size: 0.8rem;">#${t.id.slice(-6)}</td>
            <td><strong>${t.name}</strong></td>
            <td>${t.email}</td>
            <td>${t.phone || 'N/A'}</td>
            <td>${t.institution}</td>
            <td><span class="badge">${t.vertical}</span></td>
            <td style="font-size: 0.8rem; color: var(--pale-blue);">${new Date(t.timestamp).toLocaleString()}</td>
          </tr>
        `).join('');
        
      } catch (e) {
        console.error(e);
        document.getElementById('table-body').innerHTML = '<tr><td colspan="6" style="text-align:center; color: red;">ERROR: COULD NOT CONNECT TO BACKEND DATABASE. IS SERVER.CJS RUNNING?</td></tr>';
      }
    }
    
    loadTickets();
    setInterval(loadTickets, 5000); // Live update every 5 seconds
  </script>
</body>
</html>
