<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CAELYS Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    .login-container {
      max-width: 500px;
      margin: 10rem auto;
      padding: 3rem;
      border: 4px solid var(--accent-color);
      background: rgba(28, 34, 60, 0.95);
      backdrop-filter: blur(10px);
      text-align: center;
    }
  </style>
  <link rel="stylesheet" crossorigin href="/assets/style-BM0EHMeW.css">
</head>
<body>
    <!-- Brutalist Noise Overlay -->
    <div class="noise-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9998; opacity: 0.04; background-image: url('data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(&quot;%23noiseFilter&quot;)'/%3E%3C/svg%3E');"></div>
  <div class="login-container">
    <h1 class="display-small brutal-text" style="color: var(--ivory); margin-bottom: 2rem; font-size: 2rem;">RESTRICTED ACCESS</h1>
    
    <form id="login-form">
      <div class="brutal-input-group" style="text-align: left;">
        <label class="brutal-label">Username</label>
        <input type="text" id="username" class="brutal-input" required>
      </div>
      <div class="brutal-input-group" style="text-align: left; margin-top: 1rem;">
        <label class="brutal-label">Password</label>
        <input type="password" id="password" class="brutal-input" required>
      </div>
      
      <button type="submit" class="brutal-btn" style="width: 100%; margin-top: 2rem;">AUTHENTICATE</button>
      
      <p id="error-msg" class="mono-text" style="color: #ff5555; margin-top: 1rem; display: none;">Invalid credentials.</p>
    </form>
  </div>
  
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const btn = document.querySelector('button');
      
      btn.innerText = 'VERIFYING...';
      
      try {
        let ok = false;
        if (u === 'admin' && p === 'caelys2027') {
          ok = true;
        }
        
        if (ok) {
          localStorage.setItem('caelys_admin_token', 'firebase-auth-token');
          window.location.href = '/admin.html';
        } else {
          document.getElementById('error-msg').style.display = 'block';
          btn.innerText = 'AUTHENTICATE';
        }
      } catch (err) {
        document.getElementById('error-msg').innerText = 'Connection error.';
        document.getElementById('error-msg').style.display = 'block';
        btn.innerText = 'AUTHENTICATE';
      }
    });
  </script>
</body>
</html>
