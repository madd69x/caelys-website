<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CAELYS Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }
    .stats-grid {
      display: grid;
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 2rem;
      margin-bottom: 4rem;
    }
    .stat-card {
      border: 2px solid var(--border-color);
      padding: 2rem;
      background: rgba(28, 34, 60, 0.8);
      text-align: center;
    }
    .stat-num {
      font-size: 4rem;
      color: var(--accent-color);
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Space Mono', monospace;
    }
    .data-table th, .data-table td {
      border: 1px solid var(--border-color);
      padding: 1rem;
      text-align: left;
    }
    .data-table th {
      background: var(--ivory);
      color: var(--deep-space);
      text-transform: uppercase;
      font-weight: 700;
    }
    .data-table tr:hover {
      background: rgba(144, 170, 214, 0.1);
    }
    .badge {
      padding: 0.2rem 0.5rem;
      background: var(--accent-color);
      color: var(--deep-space);
      font-weight: bold;
      font-size: 0.8rem;
    }
    @media (max-width: 768px) {
        .data-table { display: block; overflow-x: auto; }
        .admin-container { padding: 2rem 1rem; }
    }
  </style>
  <script type="module" crossorigin src="/assets/admin-DZSVeF0N.js"></script>

</head>
